<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calibragem de Câmera</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/numeric/1.2.6/numeric.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <link href="./style.css" rel="stylesheet">
</head>
<body>
    <!-- Seção I - Implementação da Interface Visual -->
    <header>
        <h1>Calibragem de Câmera 3D</h1>
    </header>

    <main>
        <section id="canvas-container">
            <canvas id="canvas-calibrate"></canvas>
            <p class="bottom-text">Mapeie pelo menos 6 pontos da imagem com suas posições reais.</p>
            <p class="bottom-text">Segure CTRL para dar zoom na seleção.</p>
        </section>

        <section id="control-panel">
            <div class="button-arounder">
                <input type="file" id="image-upload" accept="image/*">
                <button onclick="document.getElementById('image-upload').click()">Carregar Imagem</button>
            </div>

            <div id="form-coords">
                <h3>Mapear Ponto</h3>
                <p id="coord-p" class="coord-text">Coordenada 2D Selecionada: <span id="display-2d">(Aguardando)</span></p>
                <label>X (Real):</label> <input class="coord-input" type="number" id="ponto-x" step="any" value="0">
                <label>Y (Real):</label> <input class="coord-input" type="number" id="ponto-y" step="any" value="0">
                <label>Z (Real):</label> <input class="coord-input" type="number" id="ponto-z" step="any" value="0">
                <button id="btn-add">Registrar</button>
            </div>

            <div id="pt-container">
                <h3>Pontos (<span id="counter">0</span>/6+)</h3>
                <ul id="pt-list"></ul>
                <button id="pt-clean" class="clean-button">Limpar Todos os Pontos</button>
            </div>

            <div id="acts-calibrate" style="margin-top: 20px;">
                <button id="btn-calc" disabled>Processar Calibragem</button>
            </div>
            
            <div id="matrix-log">Aguardando...</div>
            <div id="log-params">
                <h4 class="param-text">Parâmetros:</h4>
                <div id="out-pos"></div>
                <div id="out-rot"></div>
                <div id="out-len"></div>
            </div>
        </section>
    </main>

    <!-- Seção II - Modal de Importação e Recorte de Imagem -->
    <div id="crop-modal">
        <div id="crop-container">
            <h3>Ajuste a imagem para a proporção 16:9</h3>
            <div class="img-container">
                <img id="image-to-crop" src="">
            </div>
            <div class="modal-actions">
                <button id="btn-confirm-crop">Cortar e Aplicar</button>
                <button id="btn-cancel-crop" class="cancel-button">Cancelar</button>
            </div>
        </div>
    </div>

    <!-- Script de Lógica Principal-->
    <script src="./logic.js"></script>
    <script src="./dlt.js"></script>
</body>
</html>
